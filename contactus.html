<header class="sticky top-0 z-50 bg-white shadow-sm shadow-black md:flex md:items-center md:justify-between md:px-8 md:h-24 lg:justify-center lg:items-center">
    <div class="flex items-center justify-between h-20 px-4 md:px-0 w-full md:w-auto md:h-auto">
        <figure>
            <img src="images/logoimage.png" alt="Logo Image" class="w-16 lg:absolute lg:left-4 lg:top-8 lg:w-20">
        </figure>
        
        <div class="menu-button cursor-pointer flex flex-col gap-1 md:hidden">
            <span class="menu-icon block w-7 h-0.75 bg-black"></span>
            <span class="menu-icon block w-7 h-0.75 bg-black"></span>
            <span class="menu-icon block w-7 h-0.75 bg-black"></span>
        </div>
    </div>

    <nav class="md:block md:static md:w-auto md:bg-transparent">
        <ul class="flex flex-col md:flex-row md:items-center md:gap-8 list-none">
            <li><a href="benefits.html">Benefits</a></li> 
            <li><a href="specification.html">Specifications</a></li>
            <li><a href="howTo.html">How-to</a></li>
            <li><a href="/">Home</a></li>
            <li>
                <button class="ml-7 md:ml-0 w-40 h-12 rounded-full bg-lime-900 text-white font-bold transition hover:bg-lime-800 lg:absolute lg:right-4 top-8">
                    Learn More
                </button>
            </li>
        </ul>
    </nav>
</header>




<main class="flex flex-col justify-center items-center gap-50">

    
    <section class=" flex flex-col items-center justify-center gap-10 md:gap-28 w-full ">
        <h1 class="font-semibold text-6xl md:text-8xl w-80 md:w-96 lg:w-lg h-36 text-center">Browse everything.</h1>

        <figure>
            <img src="images/phone.png" alt="Phone picture" class="w-2xl h-auto px-3 md:hidden">
            <img src="images/disktop.png" alt="disktop" class="w-6xl h-auto px-3 hidden md:block lg:hidden">
            <img src="images/hugescreen.png" alt="hugescreen" class="w-7xl h-auto px-3 hidden lg:block">
            <figcaption class="sr-only">Phone</figcaption>
        </figure>
    </section>

    <section class="flex flex-col justify-center items-center gap-7 lg:gap-12 ">
            <h2 class="pX-7 font-stretch-semi-condensed text-5xl md:text-6xl lg:text-7xl font-serif ">Contact Us</h2>
            <p class="pX-7 text-lg md:text-2xl lg:text-3xl font-normal font-serif text-gray-900 text-center">Send Us a message and we will replay as soon as possible.</p>

        </section>

    <section class="flex flex-col justify-center items-center">
    <form action="">
        <fieldset class="border-0 flex flex-col">
            <legend class="sr-only">Contact us</legend>
            <label for="fullName" class="block font-light font-serif text-sm md:text-xl ml-1">Full Name:</label>
            <input type="text" name="fullName" id="fullName" placeholder="Enter your full name" 
            class="border rounded-full w-70 md:w-120 lg:w-150 h-10 md:h-12 px-3 mb-7">
            <label for="email" class="block font-light font-serif text-sm ml-1">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email"
            class="border rounded-full w-70 md:w-120 lg:w-150 h-10 md:h-12  px-3 mb-7">
            <label for="message" class="block font-light font-serif text-sm ml-1">A Message:</label>
            <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter your message"
            class="border w-70 md:w-120 lg:w-150 h-70 md:h-90 rounded-2xl px-3 py-1"></textarea>

        </fieldset>

        <button type="submit" class="border rounded-full w-20 py-1 mt-6 bg-lime-800 hover:bg-lime-700 text-white">Submit</button>
        <button type="reset" class="border rounded-full w-20 py-1 bg-lime-800 hover:bg-lime-700 text-white">Reset</button>
    </form>
</section>

</main>

<footer class="flex flex-col justify-around static top-0 z-50 ">
    <section class="px-7 flex flex-col md:flex-row gap-4 md:gap-10 mt-48">
        <a class="font-semibold lg:text-3xl lg:hover:text-4xl" href="benefits.html">Benifits</a>

        <a class="font-semibold lg:text-3xl lg:hover:text-4xl" href="howTo.html">How-to</a>
    </section>

    <section class="flex justify-between mt-20 items-end px-5">
        <figure class="">
            <img src="images/footerpng.png" alt="footerpng" class="h-auto w-10 lg:w-16">
            <figcaption class="sr-only">footerpng</figcaption>
        </figure>
        <p class="font-light lg:text-2xl">&copy; Area 2025</p>
        <p class="font-light lg:text-2xl">All rights reserved</p>
    </section>
</footer>
